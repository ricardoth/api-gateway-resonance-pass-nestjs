name: Deploy api-gateway-resonance-pass to Azure

on:
  push:
    branches:
      - main

env:
  NODE_VERSION: '20.x'
  AZURE_WEBAPP_NAME: api-gateway-resonance-pass

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Compilar proyecto
        run: npm run build

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: api-gateway-resonance-pass
          path: |
            dist/
            node_modules/
            package.json
            package-lock.json

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: https://api-gateway-resonance-pass.azurewebsites.net

    steps:
      - name: Descargar artefacto
        uses: actions/download-artifact@v4
        with:
          name: api-gateway-resonance-pass

      - name: Desplegar en Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .